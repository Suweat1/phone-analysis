# Spark ETL 配置 — phone-analysis
# 部署目标：spark-submit --files config/spark-etl/application.properties ...
# 加载机制：com.phone.etl.config.PhoneConfig 用 Typesafe Config 读取
# 修改 URL/路径/topic/库名：只动本文件

# ============ Spark 应用 ============
spark.app.name = phone-analysis-etl
spark.master   = local[*]

# ============ HDFS ============
hdfs.namenode   = hdfs://phone-analysis:9000
hdfs.raw-dir    = /phone-analysis/raw
hdfs.ods-dir    = /phone-analysis/ods
hdfs.dwd-dir    = /phone-analysis/dwd
hdfs.dws-dir    = /phone-analysis/dws
hdfs.ads-dir    = /phone-analysis/ads
hdfs.checkpoint = /spark-checkpoint

# ============ Hive 库名（数仓分层） ============
hive.ods-db = phone_ods
hive.dwd-db = phone_dwd
hive.dws-db = phone_dws
hive.ads-db = phone_ads

# ============ MySQL (回写看板聚合表) ============
mysql.url      = jdbc:mysql://phone-analysis:3306/phone_analysis?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
mysql.driver   = com.mysql.cj.jdbc.Driver
mysql.user     = root
mysql.password = 123456
mysql.batch-size = 1000

# ============ Kafka ============
kafka.bootstrap-servers = phone-analysis:9092
kafka.topic-raw         = phone_raw
kafka.topic-metric      = phone_metric
kafka.topic-alert       = phone_alert
kafka.consumer-group    = phone-analysis-spark
kafka.starting-offsets  = latest

# ============ Structured Streaming ============
streaming.trigger-interval-seconds  = 10
streaming.watermark-minutes         = 5
streaming.shuffle-partitions        = 8

# ============ 异常检测 / 机器学习参数 ============
ml.profit-anomaly.threshold        = 0.3
ml.profit-anomaly.window-days      = 30
ml.model-potential.kmeans-k        = 5
ml.model-potential.max-iter        = 20

# ============ 通用 ============
app.timezone = Asia/Shanghai
app.locale   = zh_CN
