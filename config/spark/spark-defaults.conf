# Spark 3.3.1 默认参数 — phone-analysis
# 部署目标：$SPARK_HOME/conf/spark-defaults.conf
# 详细说明见 docs/deploy/07-spark.md

# ============ 运行模式：local（单 JVM，最稳，最快，最简单） ============
# 历史决策：起初定 yarn client，但 8GB 单节点 VM 装下 HDFS+Hive+Kafka+ZK+MySQL+Redis 后
# YARN NM 起不来或资源不够，AM 一直 ACCEPTED 排队。20k 行数据 local[*] 跑得比 YARN 还快。
# 切 yarn 只需把 spark.master 改回 yarn 并保证 NodeManager 健康。
spark.master                     local[*]
spark.serializer                 org.apache.spark.serializer.KryoSerializer

# ============ Hive 集成 ============
spark.sql.catalogImplementation  hive
spark.sql.warehouse.dir          /user/hive/warehouse
# Spark 3.3 自带 Hive 2.3.9 client；但运行机 Metastore 是 3.1.3 → 必须指向真实 Hive 3.1.3 lib
# path 必须用 file:// 前缀，加载该目录下所有 jar 当 Hive client
spark.sql.hive.metastore.version 3.1.3
spark.sql.hive.metastore.jars    path
spark.sql.hive.metastore.jars.path  file:///opt/bigdata/service/hive/lib/*.jar

# ============ 历史服务器 ============
spark.eventLog.enabled           true
spark.eventLog.dir               hdfs://phone-analysis:9000/spark-history
spark.history.fs.logDirectory    hdfs://phone-analysis:9000/spark-history
spark.history.ui.port            18080

# ============ 单机伪分布式资源（local 模式：driver 进程内嵌 executor，不走 YARN） ============
# local[*] = 用所有 CPU；2GB driver 完全够 20000 行处理
spark.driver.memory              2g
spark.dynamicAllocation.enabled  false

# ============ SQL ============
spark.sql.shuffle.partitions     8
spark.sql.adaptive.enabled       true
spark.sql.adaptive.coalescePartitions.enabled  true

# ============ Kafka 集成（spark-sql-kafka jar 已置于 $SPARK_HOME/jars/）============
spark.sql.streaming.checkpointLocation  hdfs://phone-analysis:9000/spark-checkpoint
