# Redis 6.2.7 — phone-analysis 项目配置
# 部署目标：/opt/bigdata/service/redis/conf/redis.conf
# 详细说明见 docs/deploy/03-redis.md

# 网络
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 后台模式（不使用 systemd）
daemonize yes
pidfile /opt/bigdata/service/redis/redis.pid

# 日志
loglevel notice
logfile /opt/bigdata/log/redis/redis.log

# 数据库与目录
databases 16
dir /opt/bigdata/data/redis

# RDB 持久化
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# AOF 持久化（看板缓存允许丢失，可关；这里保守开启）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 安全
requirepass redis123

# 内存上限与回收
maxmemory 1gb
maxmemory-policy allkeys-lru
