# Kafka 3.3.1 Broker — phone-analysis
# 部署目标：$KAFKA_HOME/config/server.properties
# 详细说明见 docs/deploy/06-kafka.md

# ============ Broker ============
broker.id=0
listeners=PLAINTEXT://phone-analysis:9092
# 必须用主机名，远端 SpringBoot 客户端通过这个值回连
advertised.listeners=PLAINTEXT://phone-analysis:9092

# ============ 网络与 IO 线程 ============
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# ============ 日志（数据）目录 ============
log.dirs=/opt/bigdata/data/kafka/kafka-logs
num.partitions=3
num.recovery.threads.per.data.dir=1

# 单机伪分布式：副本数 1
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# ============ 日志保留 ============
log.retention.hours=72
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

# ============ Zookeeper ============
zookeeper.connect=phone-analysis:2181
zookeeper.connection.timeout.ms=18000

# ============ Group 协调 ============
group.initial.rebalance.delay.ms=0

# ============ Topic 行为 ============
# 开发期允许自动建 topic（生产建议关闭）
auto.create.topics.enable=true
delete.topic.enable=true
