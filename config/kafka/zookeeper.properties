# Zookeeper (Kafka 自带) — phone-analysis
# 部署目标：$KAFKA_HOME/config/zookeeper.properties
# 详细说明见 docs/deploy/06-kafka.md

dataDir=/opt/bigdata/data/kafka/zk
clientPort=2181
maxClientCnxns=64

# 关闭 admin server (3.5+ 默认开 8080，易与 SpringBoot 撞端口)
admin.enableServer=false

# 自动清理事务日志
autopurge.snapRetainCount=5
autopurge.purgeInterval=24
